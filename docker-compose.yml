services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentic-file-search:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FS_EXPLORER_HOST: 0.0.0.0
      FS_EXPLORER_PORT: 8000
      FS_EXPLORER_PYTHON_BIN: /opt/venv/bin/python
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    ports:
      - "${FS_EXPLORER_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
